name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Release (version bump)"]
    types: [completed]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && (github.event_name != 'release' || github.event.release.author.login != 'github-actions[bot]')
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      should_run: ${{ steps.vars.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Determine version tag + docker tags
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION_FROM_PACKAGE=$(python -c "import json; print(json.load(open('package.json'))['version'])")
            TAG="v$VERSION_FROM_PACKAGE"
          elif [ "$EVENT_NAME" = "workflow_run" ]; then
            VERSION_FROM_PACKAGE=$(python -c "import json; print(json.load(open('package.json'))['version'])")
            TAG="v$VERSION_FROM_PACKAGE"

            git fetch --tags --force

            if ! git show-ref --tags --verify --quiet "refs/tags/$TAG"; then
              echo "Tag $TAG not found for this commit. Nothing to release." >&2
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            HEAD_COMMIT=$(git rev-parse HEAD)
            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              echo "Tag $TAG points to $TAG_COMMIT, expected $HEAD_COMMIT. Nothing to release." >&2
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            TAG="$REF_NAME"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag like v1.2.3, got '$TAG'" >&2
            exit 1
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"

          GHCR_IMAGE="ghcr.io/${REPO,,}"
          TAGS="$GHCR_IMAGE:$VERSION
          $GHCR_IMAGE:$MAJOR.$MINOR
          $GHCR_IMAGE:$MAJOR
          $GHCR_IMAGE:latest"

          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            DH_IMAGE="$DOCKERHUB_USERNAME/portfolio"
            TAGS="$DH_IMAGE:$VERSION
          $DH_IMAGE:$MAJOR.$MINOR
          $DH_IMAGE:$MAJOR
          $DH_IMAGE:latest
          $TAGS"
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for multi-platform)
        if: steps.vars.outputs.should_run == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.vars.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.vars.outputs.should_run == 'true' && steps.vars.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: steps.vars.outputs.should_run == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.vars.outputs.should_run == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Portfolio
            org.opencontainers.image.description=Modern self-hosted portfolio with Next.js 16, admin dashboard, MDX content, and SSO support
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    if: (github.event_name == 'push' || github.event_name == 'workflow_run') && needs.docker.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.docker.outputs.tag }}
          generate_release_notes: true
          body_prefix: |
            ## Docker Images

            Pull from Docker Hub:
            ```sh
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:${{ needs.docker.outputs.version }}
            ```

            Pull from GitHub Container Registry:
            ```sh
            docker pull ghcr.io/${{ github.repository }}:${{ needs.docker.outputs.version }}
            ```
