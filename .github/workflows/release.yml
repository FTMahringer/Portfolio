name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver tag to release (e.g. v1.2.3). Required if running on a branch."
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Determine version tag + docker tags
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "For manual runs, either select a tag ref (vX.Y.Z) or provide inputs.tag=vX.Y.Z. Got '$TAG'." >&2
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag like v1.2.3, got '$TAG'" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"

          GHCR_IMAGE="ghcr.io/$REPO"
          TAGS="$GHCR_IMAGE:$VERSION
          $GHCR_IMAGE:$MAJOR.$MINOR
          $GHCR_IMAGE:$MAJOR
          $GHCR_IMAGE:latest"

          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            DH_IMAGE="$DOCKERHUB_USERNAME/portfolio"
            TAGS="$DH_IMAGE:$VERSION
          $DH_IMAGE:$MAJOR.$MINOR
          $DH_IMAGE:$MAJOR
          $DH_IMAGE:latest
          $TAGS"
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - name: Set up QEMU (for multi-platform)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.vars.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release (tag push)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body_prefix: |
            ## Docker Images

            Pull from Docker Hub:
            ```sh
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:${{ github.ref_name }}
            ```

            Pull from GitHub Container Registry:
            ```sh
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
