  enabled: true
  repo: "FTMahringer/Portfolio"
  repoId: ""  # Get from giscus.app
  category: "Comments"
  categoryId: ""  # Get from giscus.app
  mapping: "pathname"
  reactionsEnabled: true
  emitMetadata: false
  inputPosition: "bottom"
  theme: "preferred_color_scheme"
  lang: "en"

